spring:
  application:
    name: jwt-spring-boot

  main:
    allow-circular-references: true

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: superTajneHaslo1234567890SuperTajneHaslo1234567890ZmienToNaCosMocnego2026
  expiration: 86400000

logging:
  level:
    org.springframework: INFO
    com.example.jwt: DEBUG